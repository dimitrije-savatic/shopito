<!DOCTYPE html>
<html lang="en">
<head>
    <title>Shopito - Cart</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description"
        content="Review your selected items and proceed to secure checkout. Fast, simple, and safe shopping experience.">

    <link rel="apple-touch-icon" href="assets/img/apple-icon.png">
    <link rel="shortcut icon" type="image/x-icon" href="assets/img/favicon.ico">

    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/templatemo.css">
    <link rel="stylesheet" href="assets/css/custom.css">

    <!-- Load fonts style after rendering the layout styles -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;200;300;400;500;700;900&display=swap">
    <link rel="stylesheet" href="assets/css/fontawesome.min.css">
</head>

<body>
    <!-- Header -->
    <nav class="navbar navbar-expand-lg navbar-light shadow" id="header">
    </nav>
    <!-- Close Header -->

    <!-- Start Content -->
    <div class="container py-5">
        <div class="row d-flex justify-content-around">
            <div class="col-lg-8 pr-3">
                <h4 class="mb-3">Cart</h4>
                <div class="row" id="cartContainer">
                </div>
            </div>
            <!-- Checkout Sidebar -->
            <div class="col-lg-3 p-4 border rounded h-100">
                <h4 class="mb-3">Checkout</h4>

                <!-- Total price -->
                <div class="mb-3 border-top pt-3">
                    <h5 class="mb-0">Total price</h5>
                    <h5 id="totalPrice" class="text-success mt-3 w-25 text-center">$0.00</h5>
                </div>


                <!-- Total Discount -->
                <div class="mb-3 border-top pt-3 border-bottom pb-3">
                    <h5 class="mb-0">Total discount</h5>
                    <h5 id="discountPrice" class="text-white text-center mt-3 bg-danger w-25 rounded">-0%</h5>
                </div>


                <div class="d-flex justify-content-end gap-2 mb-3">
                    <button class="btn btn-success" id="checkoutButton">Checkout</button>
                    <button class="btn btn-danger" id="cancelButton">Cancel</button>
                </div>
            </div>
            <!-- End Checkout Sidebar-->
        </div>
    </div>
    <!-- End Content -->

    <!-- Start Footer -->
    <footer class="bg-dark" id="tempaltemo_footer">
    </footer>
    <!-- End Footer -->

    <!-- Back to top button -->
    <button id="backToTop" class="btn btn-success">
        <i class="fas fa-arrow-up"></i>
    </button>
    <!-- End Back to top button -->

    <!-- Start Script -->
    <script src="assets/js/jquery-1.11.0.min.js"></script>
    <script src="assets/js/jquery-migrate-1.2.1.min.js"></script>
    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/templatemo.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/cart.js"></script>
    <!-- End Script -->
</body>

</html>
